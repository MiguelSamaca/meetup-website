<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MeetUp — Transformamos tus espacios corporativos en entornos de colaboración avanzada. Salas inteligentes con Teams Rooms, Zoom Rooms y Google Meet." />
  <meta property="og:title" content="MeetUp — Salas Inteligentes" />
  <meta property="og:description" content="Conectando Ideas, Creando Experiencias. Soluciones de videoconferencia para espacios de alto impacto." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://meetupco.com/" />
  <title>MeetUp — Salas Inteligentes | Conectando Ideas, Creando Experiencias</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Accesibilidad -->
  <a class="skip-link" href="#main">Ir al contenido principal</a>

  <!-- ══════════════════════════════════════════
       SECCIÓN 0 — TOP BAR
       ══════════════════════════════════════════ -->
  <div class="top-bar" role="banner" aria-label="Barra de utilidades">
    <!-- Links utilitarios: Recursos, Soporte, Contacto, teléfono -->
  </div>

  <!-- ══════════════════════════════════════════
       SECCIÓN 1 — NAVBAR
       ══════════════════════════════════════════ -->
  <header class="navbar" role="navigation" aria-label="Menú principal">
    <!-- Logo | Menú (Soluciones, Casos de Uso, Beneficios, Proceso, Recursos, Contacto) | CTA TIENDA -->
  </header>

  <main id="main">

    <!-- ══════════════════════════════════════════
         SECCIÓN 2 — HERO (Slider 4 imágenes)
         ══════════════════════════════════════════ -->
    <section class="hero" aria-label="Banner principal">
      <!-- Slider full-screen | H1 | Subtítulo | CTA "Cotiza tu Sala Ideal" -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 3 — QUOTE DESTACADA
         ══════════════════════════════════════════ -->
    <section class="quote-section" aria-label="Cita destacada">
      <!-- "Creamos soluciones para generar experiencias grupales de alta productividad" -->
      <!-- Efecto watermark tipográfico decorativo -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 4 — PROPUESTA DE VALOR
         ══════════════════════════════════════════ -->
    <section class="value-prop section" aria-label="Propuesta de valor">
      <!-- Imagen de fondo + overlay -->
      <!-- H2 | Párrafo | 3 métricas: Consultoría, Ingeniería AV, Soporte continuo -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 5 — SOLUCIONES (4 Tabs)
         ══════════════════════════════════════════ -->
    <section class="solutions section" id="soluciones" aria-label="Soluciones">
      <!-- Tab 1: Diseño e Implementación (fondo azul oscuro) -->
      <!-- Tab 2: Integración Plataformas  (fondo teal oscuro) -->
      <!-- Tab 3: Automatización           (fondo violeta oscuro) -->
      <!-- Tab 4: Experiencia Completa     (fondo negro) -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 6 — TAMAÑO DE SALA (Configurador)
         ══════════════════════════════════════════ -->
    <section class="room-configurator section" id="configurador" aria-label="Soluciones por tamaño de sala">
      <!-- Panel izquierdo: Huddle | Mediana | Grande | Auditorio -->
      <!-- Panel central: imagen de sala según selección -->
      <!-- Panel derecho: specs y equipamiento -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 7 — SOPORTE / PAQUETES
         ══════════════════════════════════════════ -->
    <section class="support-plans section" aria-label="Paquetes de soporte">
      <!-- 3 cards: Esencial | Profesional | Enterprise -->
      <!-- Métricas: Uptime, Uso real, CSAT -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 8 — INDUSTRIAS / CASOS DE USO
         ══════════════════════════════════════════ -->
    <section class="industries section" id="casos" aria-label="Casos de uso por industria">
      <!-- Carousel: Corporativo | Educación | Gobierno | Salud -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 9 — BENEFICIOS (6 Pilares)
         ══════════════════════════════════════════ -->
    <section class="benefits section" id="beneficios" aria-label="Beneficios clave">
      <!-- 6 pilares con íconos + divisores:
           Reuniones sin fricción | Experiencia homogénea | Escalabilidad
           Menos soporte TI | Optimización energética | ROI medible -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 10 — CASOS DE ÉXITO
         ══════════════════════════════════════════ -->
    <section class="success-cases section" aria-label="Casos de éxito">
      <!-- Card grande: Multinacional financiera -->
      <!-- Card secundaria: Universidad privada -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 11 — PROCESO (6 Pasos)
         ══════════════════════════════════════════ -->
    <section class="process section" id="proceso" aria-label="Proceso de implementación">
      <!-- 6 pasos: Descubrimiento > Diseño > Piloto > Ejecución > Handover > Operación -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 12 — ALIADOS Y PLATAFORMAS
         ══════════════════════════════════════════ -->
    <section class="partners section" aria-label="Aliados tecnológicos">
      <!-- Logos certificados: Teams | Zoom | Google Meet -->
      <!-- Carrusel fabricantes: logos aliados -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 13 — RECURSOS EDUCATIVOS
         ══════════════════════════════════════════ -->
    <section class="resources section" id="recursos" aria-label="Recursos educativos">
      <!-- Card grande: Guía — Cómo elegir la solución ideal -->
      <!-- Card secundaria 1: Artículo — 5 claves para reducir incidencias -->
      <!-- Card secundaria 2: Informe — Tendencias 2025 en espacios inteligentes -->
    </section>

    <!-- ══════════════════════════════════════════
         SECCIÓN 14 — FORMULARIO DE CONTACTO
         ══════════════════════════════════════════ -->
    <section class="contact section" id="Contacto" aria-label="Formulario de contacto">
      <!-- Imagen de fondo sala de reuniones -->
      <!-- Card flotante: "Diseñemos juntos tu sala de reuniones ideal" -->
      <!-- Formulario: Email* | Teléfono | Empresa | Nombre | Apellidos | ENVIAR -->
    </section>

  </main>

  <!-- ══════════════════════════════════════════
       SECCIÓN 15 — FOOTER
       ══════════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <!-- Logo + tagline "CONECTANDO IDEAS, CREANDO EXPERIENCIAS" -->
    <!-- 3 columnas: Soluciones | Industrias | Empresa -->
    <!-- Redes sociales | Copyright © 2026 | Powered by CrearPaginaWeb.co -->
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
